# claude-feishu-channel configuration file.
#
# Copy this file to ~/.claude-feishu-channel/config.toml and fill in the
# values for your Feishu bot. Or set CLAUDE_FEISHU_CONFIG to point at a
# custom location.

# ─── Feishu app credentials ──────────────────────────────────────────
[feishu]
# Get these from https://open.feishu.cn/app -> your app -> Credentials
app_id = "cli_xxxxxxxxxxxxxxxx"
app_secret = "xxxxxxxxxxxxxxxxxxxxxxxxxx"

# Optional: only needed if you enabled event encryption in the Feishu
# developer console.
encrypt_key = ""
verification_token = ""

# ─── Access control ──────────────────────────────────────────────────
# The bot has full shell/file access to your machine. Lock it down!
[access]
# List of open_id values allowed to talk to the bot. To find yours,
# have the bot log the `sender_open_id` of an incoming message.
allowed_open_ids = [
  "ou_your_open_id_here",
]
# "ignore" = silently drop unauthorized messages (recommended)
# "reject" = reply with an error (noisy; reveals bot exists)
unauthorized_behavior = "ignore"

# ─── Claude runtime ──────────────────────────────────────────────────
[claude]
# Absolute path where Claude Code sessions should run (use ~ to expand
# to your home directory). This is the cwd every new session starts in
# until /cd lands in Phase 6.
default_cwd = "~/my-projects"

# Permission mode for new sessions. Options:
#   default            — Claude asks for every tool use. In bot mode this
#                        HANGS the turn because there's nobody to answer
#                        the prompt. Use acceptEdits or bypassPermissions
#                        until Phase 5 adds interactive permission cards.
#   acceptEdits        — auto-approve file edits, ask for shell
#   plan               — plan mode, read-only
#   bypassPermissions  — auto-approve everything (dangerous)
default_permission_mode = "bypassPermissions"

# Model id passed to the CLI's --model flag. Any model the local
# `claude` CLI accepts (e.g. "claude-opus-4-6", "claude-sonnet-4-6",
# or aliases like "opus" / "sonnet").
default_model = "claude-opus-4-6"

# Path to the local Claude Code CLI binary. Leave as "claude" to resolve
# via $PATH, or set an absolute path if the binary lives outside PATH.
# Run `which claude` to find yours.
cli_path = "claude"

# ─── Render / Feishu cards ───────────────────────────────────────────
[render]
# Max UTF-8 bytes of inline content (tool input params, tool output
# previews) shown in a card before we truncate and append
# "... (N more bytes omitted)".
inline_max_bytes = 2048

# If true, skip Claude's extended-thinking blocks entirely instead of
# sending them as 💭 messages.
hide_thinking = false

# If true, send a small "✅ 12.3s · 1.2k in / 3.4k out" tip after each
# turn. Disable if you find it noisy.
show_turn_stats = true

# ─── Persistence paths ───────────────────────────────────────────────
[persistence]
state_file = "~/.claude-feishu-channel/state.json"
# log_dir is reserved for Phase 2+ file logging. Phase 1 logs to stdout only.
log_dir = "~/.claude-feishu-channel/logs"

# ─── Logging ─────────────────────────────────────────────────────────
[logging]
# trace | debug | info | warn | error
level = "info"
